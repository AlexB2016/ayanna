<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayanna Wellness Concept - Preview Client</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f4f1ee; /* O culoare neutră de fundal specifică SPA */
            display: flex;
            justify-content: center;
        }

        .screenshot-container {
            width: 100%;
            max-width: 1920px; /* Previne întinderea excesivă pe ecrane UltraWide */
            box-shadow: 0 0 50px rgba(0,0,0,0.1); /* Oferă un aspect de "pagină" */
        }

        .screenshot-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Stil pentru scrollbar personalizat (opțional, pentru aspect premium) */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #c5b358; /* Culoarea aurie Ayanna */
        }
    </style>
</head>
<body>

    <div class="screenshot-container">
        <img src="ayanna.png" alt="Ayanna Wellness Concept Preview">
    </div>

</body>
</html>
